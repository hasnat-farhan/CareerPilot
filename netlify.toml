# CareerPilot — Netlify configuration
#
# Why this file exists
# --------------------
# We deploy this app to Netlify (not Vercel). Without a
# `netlify.toml` Netlify still builds the site, but the
# Next.js plugin is not wired up and App Router API routes
# (e.g. `app/api/cv/upload/route.ts`) are NOT deployed as
# serverless functions — the request falls through to
# Netlify's static-asset handling and returns
# `<!DOCTYPE html>...`. The client then surfaces this as
# `Unexpected token '<', "<!DOCTYPE "... is not valid JSON`
# on `await res.json()`.
#
# This file:
#   1. Registers the `@netlify/plugin-nextjs` plugin so
#      the App Router API routes get bundled and deployed
#      as Netlify Functions.
#   2. Pins Node 20 (required by `pdf-parse@2` and
#      `@google/generative-ai`).
#   3. Disables Next.js telemetry at build time.
#
# Required env vars (set in Netlify UI, NOT in this file):
#   - NEXT_PUBLIC_SUPABASE_URL
#   - SUPABASE_SERVICE_ROLE_KEY
#   - NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY
#   - CLERK_SECRET_KEY
#   - GEMINI_API_KEY
#   - TAVILY_API_KEY
#   - ADZUNA_APP_ID
#   - ADZUNA_APP_KEY

# ---------- Build ----------
[build]
  command = "next build"
  publish = ".next"

# ---------- Functions ----------
#
# Do NOT set `[functions] directory` here. The
# `@netlify/plugin-nextjs` plugin below manages function
# discovery itself and emits the bundled handler at
# `.netlify/functions-internal/___netlify-server-handler/`
# (function name: `___netlify-server-handler`). Overriding
# `directory` to `netlify/functions` (a path that does not
# exist in this repo) makes Netlify's runtime look in the
# wrong place; API route requests then fall through to
# static-asset handling and return `<!DOCTYPE html>...`,
# which the client surfaces as
# `Unexpected token '<', "<!DOCTYPE "... is not valid JSON`.
#
# Function `timeout` is NOT configurable from `netlify.toml`
# — Netlify's TOML schema only accepts `directory`,
# `node_bundler`, `external_node_modules`, and
# `included_files` under `[functions]`. The default
# sync-function timeout is 10s (free tier) or 26s (Pro) and
# can only be raised per-function in the Netlify UI under
# Site settings → Functions → [function] → Settings.
# The single bundled handler is named
# `___netlify-server-handler`.

# ---------- Plugins ----------
#
# The Next.js plugin is REQUIRED. It wires App Router API
# routes (`app/api/**`) up as Netlify Functions; without
# it, the upload route is not reachable as a function and
# the client receives HTML instead of JSON.
[[plugins]]
  package = "@netlify/plugin-nextjs"

# ---------- Environment hints ----------
[build.environment]
  NODE_VERSION = "20"
  NEXT_TELEMETRY_DISABLED = "1"
